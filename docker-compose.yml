version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - MONGODB_URL=mongodb://gradeai_admin:secure_db_password_123!@mongo:27017
      - DATABASE_NAME=gradeai_db
      - JWT_SECRET=prod_super_secret_key_change_me!
    depends_on:
      - mongo
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: always

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=gradeai_admin
      - MONGO_INITDB_ROOT_PASSWORD=secure_db_password_123!
    volumes:
      - mongodb_data:/data/db
    restart: always

volumes:
  mongodb_data:
